<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Compass 1000 Audit</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: #101418; color: #f8fafc; }
      main { width: min(980px, calc(100% - 32px)); margin: 32px auto; }
      h1 { margin: 0 0 10px; font-size: 30px; }
      p { color: #b6c7d3; line-height: 1.55; }
      .panel { margin-top: 18px; padding: 18px; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; background: rgba(15,23,42,.78); }
      label { display: block; margin: 12px 0 6px; font-weight: 800; }
      input { width: 100%; height: 42px; padding: 0 12px; border: 1px solid rgba(255,255,255,.14); border-radius: 8px; background: #020617; color: #f8fafc; box-sizing: border-box; }
      button { height: 44px; margin-top: 14px; padding: 0 18px; border: 0; border-radius: 8px; background: #2dd4bf; color: #06201c; font-weight: 900; cursor: pointer; }
      button:disabled { opacity: .55; cursor: wait; }
      progress { width: 100%; height: 18px; margin-top: 14px; }
      table { width: 100%; margin-top: 16px; border-collapse: collapse; font-size: 13px; }
      th, td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,.1); text-align: left; }
      th { color: #99f6e4; }
      .log { max-height: 260px; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; color: #cbd5e1; }
      .ok { color: #86efac; }
      .fail { color: #fecaca; }
    </style>
  </head>
  <body>
    <main>
      <h1>Stock Compass 1000개 검증</h1>
      <p>배포된 앱 API로 최대 1000개 미국 주식을 검사하고, 전날 데이터만 사용한 하루 예측을 실제 다음 종가와 비교한 뒤 Excel에서 열리는 .xls 파일을 만듭니다.</p>
      <section class="panel">
        <label for="baseUrl">배포 URL</label>
        <input id="baseUrl" value="" placeholder="비워두면 현재 배포 주소를 사용합니다" />
        <label for="limit">검사 종목 수</label>
        <input id="limit" type="number" min="1" max="1000" value="1000" />
        <label for="workers">동시 요청 수</label>
        <input id="workers" type="number" min="1" max="20" value="8" />
        <button id="runButton">1000개 검사 시작</button>
        <progress id="progress" value="0" max="1000"></progress>
        <p id="status">대기 중</p>
      </section>
      <section class="panel">
        <h2>요약</h2>
        <table>
          <tbody id="summary"></tbody>
        </table>
      </section>
      <section class="panel">
        <h2>실행 로그</h2>
        <div class="log" id="log"></div>
      </section>
    </main>
    <script>
      const fallbackSymbols = [
        "AAPL","MSFT","NVDA","AMZN","GOOGL","META","TSLA","AVGO","BRK.B","LLY","JPM","V","UNH","XOM","MA","COST","WMT","NFLX","PG","ORCL",
        "HD","JNJ","ABBV","BAC","KO","PLTR","PM","CRM","CVX","AMD","CSCO","ABT","MCD","IBM","WFC","GE","LIN","TMO","MRK","DIS",
        "AXP","MS","NOW","ISRG","ACN","GS","PEP","QCOM","ADBE","INTU","CAT","TXN","VZ","BKNG","RTX","SPGI","AMGN","T","PGR","NEE",
        "UBER","LOW","HON","UNP","PFE","BLK","ETN","SYK","TJX","BSX","C","DHR","PANW","SCHW","GILD","AMAT","CMCSA","BA","ADP","DE",
        "COP","ANET","VRTX","MDT","ADI","MMC","LMT","CB","MU","NKE","KLAC","UPS","SBUX","SO","ICE","MO","BMY","CME","ELV","INTC",
        "DUK","MCO","WM","FI","SHW","APH","EQIX","TT","PH","CDNS","ORLY","WELL","AON","CTAS","HCA","CI","SNPS","MDLZ","TDG","MSI",
        "AJG","MMM","PNC","ZTS","USB","MAR","EOG","APO","REGN","ITW","CL","EMR","GD","NOC","COF","FTNT","ECL","RCL","WMB","ADSK",
        "APD","ROP","BK","HLT","TGT","TRV","CSX","AFL","AZO","JCI","ABNB","FCX","NSC","OKE","KMI","COR","PCAR","DLR","SLB","NXPI",
        "PAYX","GM","FDX","SPG","AEP","BDX","MET","PSA","SRE","MNST","ALL","MPC","URI","PSX","CMG","D","AMP","ROST","GWW","O",
        "DHI","LHX","AIG","KMB","F","KDP","TEL","PWR","KR","VLO","MSCI","CPRT","CCI","FIS","OXY","FAST","HUM","EW","AME","PRU",
        "PEG","VRSK","IDXX","CTVA","YUM","OTIS","TRGP","EA","EXC","CTSH","KVUE","HES","RSG","CBRE","XEL","IR","VMC","ED","ACGL","SYY",
        "MLM","NDAQ","GEHC","FANG","IT","LULU","LEN","DAL","RMD","ODFL","DD","DFS","ROK","WAB","DXCM","XYL","EFX","GLW","EXR","WEC",
        "GRMN","VICI","AXON","WTW","HPQ","MTB","IRM","TSCO","HIG","AVB","EIX","PPG","EBAY","ANSS","TTWO","FITB","CAH","CSGP","KEYS","BRO",
        "GPN","KHC","AWK","DOW","CHTR","NTAP","NUE","DOV","PHM","TYL","TROW","BR","HAL","VLTO","FTV","HPE","LYB","DTE","SBAC","CDW",
        "PPL","DECK","AEE","STT","WST","WDC","MTD","FE","IFF","EQR","ETR","HBAN","CHD","ON","SW","BIIB","DVN","WY","LYV","STE",
        "RF","ES","PTC","STX","ZBH","CBOE","CINF","CMS","INVH","LDOS","MKC","LH","TER","GDDY","LII","COO","CLX","PODD","WAT","DRI",
        "ATO","NRG","CFG","PKG","ULTA","TDY","SYF","EXPE","MOH","NTRS","ESS","MAA","BALL","JBL","ARE","FSLR","DG","ZBRA","HOLX","VTR",
        "OMC","TSN","IEX","CTRA","BAX","L","EXPD","BBY","MAS","AVY","WRB","DGX","J","LUV","GEN","K","ALGN","CF","TXT","EG",
        "KEY","AKAM","DOC","PNR","SWKS","TRMB","RVTY","SNA","POOL","CAG","ROL","MGM","VRSN","ENPH","UHS","JBHT","AMCR","KIM","NI","NDSN",
        "REG","JKHY","EPAM","HST","JNPR","ALLE","CHRW","NWSA","TECH","FOXA","AOS","LKQ","FFIV","EMN","IPG","TPR","UDR","SWK","BG","WYNN",
        "RL","QRVO","CRL","GL","HII","HSIC","APA","INCY","TFX","CPT","MKTX","BXP","AIZ","PAYC","PNW","FRT","DAY","MOS","MTCH","GNRC",
        "CPB","HAS","MHK","LW","CZR","NCLH","FMC","WBA","PARA","FOX","NWS","IVZ","BEN","AAL","BWA","ETSY","SOLV","CE","BBWI","SMCI"
      ];

      const $ = (id) => document.getElementById(id);
      const log = (text) => { $("log").textContent += `${text}\n`; $("log").scrollTop = $("log").scrollHeight; };
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const sma = (values, length) => values.slice(-length).reduce((a, b) => a + b, 0) / values.slice(-length).length;
      function rsi(values, length = 14) {
        const recent = values.slice(-(length + 1));
        let gains = 0, losses = 0;
        for (let i = 1; i < recent.length; i++) {
          const change = recent[i] - recent[i - 1];
          if (change >= 0) gains += change; else losses += Math.abs(change);
        }
        if (losses === 0) return 100;
        const rs = gains / losses;
        return 100 - 100 / (1 + rs);
      }
      const dailyReturns = (values) => values.slice(1).map((value, index) => Math.log(value / values[index]));
      function stddev(values) {
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        return Math.sqrt(values.reduce((sum, value) => sum + (value - mean) ** 2, 0) / values.length);
      }
      function normalCdf(x) {
        const t = 1 / (1 + 0.2316419 * Math.abs(x));
        const d = 0.3989423 * Math.exp((-x * x) / 2);
        const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
        return x > 0 ? 1 - p : p;
      }
      function maxDrawdown(values, window = 60) {
        const sample = values.slice(-window);
        let peak = sample[0], worst = 0;
        for (const value of sample) {
          peak = Math.max(peak, value);
          worst = Math.min(worst, (value - peak) / peak);
        }
        return worst;
      }
      function forecastProbability(values) {
        const last = values.at(-1);
        const previous = values.at(-2);
        const returns = dailyReturns(values);
        const vol = stddev(returns.slice(-20));
        const avg20 = returns.slice(-20).reduce((a, b) => a + b, 0) / Math.min(20, returns.length);
        const trendProbability = normalCdf(vol ? avg20 / (vol / Math.sqrt(20)) : 0);
        const momentum20 = (last - values.at(-21)) / values.at(-21);
        const currentRsi = rsi(values);
        const shortHeat = currentRsi > 72 ? 0.43 : currentRsi < 32 ? 0.57 : 0.51;
        const mediumTrend = last > sma(values, Math.min(60, values.length)) ? 0.56 : 0.44;
        const recentDirection = last > previous ? 0.53 : 0.47;
        const drawdown = maxDrawdown(values);
        const uncertaintyPenalty = clamp(vol * 2.2 + Math.abs(drawdown) * 0.35, 0, 0.16);
        const raw = trendProbability * 0.38 + (momentum20 > 0 ? 0.58 : 0.42) * 0.22 + mediumTrend * 0.18 + shortHeat * 0.14 + recentDirection * 0.08 - uncertaintyPenalty;
        return Math.round(clamp(raw * 100, 22, 78));
      }
      async function fetchJson(url, timeoutMs = 12000) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, { signal: controller.signal });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        } finally {
          clearTimeout(timeout);
        }
      }
      async function loadSymbols(limit) {
        const sources = [
          "https://www.nasdaqtrader.com/dynamic/SymDir/nasdaqlisted.txt",
          "https://www.nasdaqtrader.com/dynamic/SymDir/otherlisted.txt"
        ];
        const symbols = [];
        for (const src of sources) {
          const urls = [src, `https://api.allorigins.win/raw?url=${encodeURIComponent(src)}`, `https://corsproxy.io/?url=${encodeURIComponent(src)}`];
          for (const url of urls) {
            try {
              const response = await fetch(url);
              if (!response.ok) throw new Error("symbol source failed");
              const text = await response.text();
              const lines = text.split(/\r?\n/).filter((line) => line.includes("|") && !line.startsWith("File Creation"));
              const header = lines[0].split("|");
              for (const line of lines.slice(1)) {
                const cols = Object.fromEntries(line.split("|").map((value, index) => [header[index], value]));
                const symbol = (cols.Symbol || cols["ACT Symbol"] || "").trim();
                if (!symbol || symbol.includes("$") || symbol.includes(".") || cols["Test Issue"] === "Y" || cols.ETF === "Y") continue;
                symbols.push(symbol);
              }
              break;
            } catch {}
          }
        }
        fallbackSymbols.forEach((symbol) => symbols.push(symbol));
        return [...new Set(symbols)].slice(0, limit);
      }
      async function auditSymbol(baseUrl, symbol) {
        const started = performance.now();
        try {
          const rows = await fetchJson(`${baseUrl.replace(/\/$/, "")}/api/prices?symbol=${encodeURIComponent(symbol)}`);
          const clean = rows.filter((row) => row.date && Number.isFinite(row.close));
          if (clean.length < 80) throw new Error(`not enough rows: ${clean.length}`);
          const closes = clean.map((row) => row.close);
          const nowProbability = forecastProbability(closes);
          const history = clean.slice(0, -1);
          const probabilityThen = forecastProbability(history.map((row) => row.close));
          const predictedUp = probabilityThen >= 50;
          const actualUp = clean.at(-1).close > history.at(-1).close;
          return {
            symbol, status: "OK", rows: clean.length, lastDate: clean.at(-1).date, lastClose: clean.at(-1).close,
            probabilityNow: nowProbability, predictionDate: history.at(-1).date, actualDate: clean.at(-1).date,
            predictionClose: history.at(-1).close, actualClose: clean.at(-1).close, probabilityThen,
            predictedDirection: predictedUp ? "UP" : "DOWN", actualDirection: actualUp ? "UP" : "DOWN",
            correct: predictedUp === actualUp, elapsedSec: ((performance.now() - started) / 1000).toFixed(2), error: ""
          };
        } catch (error) {
          return { symbol, status: "FAIL", rows: 0, lastDate: "", lastClose: "", probabilityNow: "", predictionDate: "", actualDate: "", predictionClose: "", actualClose: "", probabilityThen: "", predictedDirection: "", actualDirection: "", correct: "", elapsedSec: ((performance.now() - started) / 1000).toFixed(2), error: error.message };
        }
      }
      function htmlEscape(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      }
      function downloadExcel(results, baseUrl) {
        const ok = results.filter((row) => row.status === "OK");
        const correct = ok.filter((row) => row.correct === true);
        const summary = [
          ["Generated At", new Date().toISOString()],
          ["Base URL", baseUrl],
          ["Symbols Tested", results.length],
          ["Price Data OK", ok.length],
          ["Price Data Failed", results.length - ok.length],
          ["One-Day Backtest Correct", correct.length],
          ["One-Day Backtest Accuracy", ok.length ? `${(correct.length / ok.length * 100).toFixed(2)}%` : "N/A"],
          ["Formula", "Weighted probability: log-return trend 38%, 20-day momentum 22%, 60-day trend 18%, short-term heat 14%, last-day direction 8%, minus volatility/drawdown penalty. Clamped to 22%-78%."]
        ];
        const qaHeaders = ["symbol","status","rows","lastDate","lastClose","probabilityNow","elapsedSec","error"];
        const btHeaders = ["symbol","predictionDate","actualDate","predictionClose","actualClose","probabilityThen","predictedDirection","actualDirection","correct","error"];
        const table = (title, headers, rows) => `<h2>${title}</h2><table border="1"><tr>${headers.map((h) => `<th>${htmlEscape(h)}</th>`).join("")}</tr>${rows.map((row) => `<tr>${headers.map((h) => `<td>${htmlEscape(row[h])}</td>`).join("")}</tr>`).join("")}</table>`;
        const summaryTable = `<h2>Summary</h2><table border="1">${summary.map((row) => `<tr><th>${htmlEscape(row[0])}</th><td>${htmlEscape(row[1])}</td></tr>`).join("")}</table>`;
        const formulaTable = `<h2>Formula</h2><table border="1"><tr><th>Component</th><th>Weight / Rule</th><th>Purpose</th></tr>
          <tr><td>Log-return trend probability</td><td>38%</td><td>Recent return strength adjusted for volatility</td></tr>
          <tr><td>20-day momentum sign</td><td>22%</td><td>Positive recent price change</td></tr>
          <tr><td>60-day trend</td><td>18%</td><td>Above or below medium-term average</td></tr>
          <tr><td>Short-term heat</td><td>14%</td><td>Overextended or depressed move</td></tr>
          <tr><td>Last-day direction</td><td>8%</td><td>Small recency signal</td></tr>
          <tr><td>Uncertainty penalty</td><td>volatility*2.2 + drawdown*0.35, capped at 16 points</td><td>Risk confidence reduction</td></tr></table>`;
        const workbook = `<!doctype html><html><head><meta charset="utf-8"></head><body>${summaryTable}${table("1000_QA", qaHeaders, results)}${table("One_Day_Backtest", btHeaders, results)}${formulaTable}</body></html>`;
        const blob = new Blob([workbook], { type: "application/vnd.ms-excel;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `stock-compass-audit-${new Date().toISOString().slice(0, 10)}.xls`;
        link.click();
        URL.revokeObjectURL(link.href);
      }
      async function run() {
        const baseUrl = $("baseUrl").value.trim() || location.origin;
        const limit = Math.min(1000, Math.max(1, Number($("limit").value) || 1000));
        const workers = Math.min(20, Math.max(1, Number($("workers").value) || 8));
        $("runButton").disabled = true;
        $("log").textContent = "";
        $("summary").innerHTML = "";
        $("status").textContent = "종목 목록 불러오는 중";
        const symbols = await loadSymbols(limit);
        $("progress").max = symbols.length;
        $("progress").value = 0;
        log(`Loaded ${symbols.length} symbols`);
        const results = [];
        let cursor = 0;
        async function worker() {
          while (cursor < symbols.length) {
            const symbol = symbols[cursor++];
            const result = await auditSymbol(baseUrl, symbol);
            results.push(result);
            $("progress").value = results.length;
            $("status").textContent = `${results.length}/${symbols.length} 검사 중`;
            log(`${results.length}/${symbols.length} ${result.symbol} ${result.status} ${result.probabilityNow || ""} ${result.error || ""}`);
          }
        }
        await Promise.all(Array.from({ length: workers }, worker));
        results.sort((a, b) => a.symbol.localeCompare(b.symbol));
        const ok = results.filter((row) => row.status === "OK");
        const correct = ok.filter((row) => row.correct === true);
        $("summary").innerHTML = `
          <tr><th>검사 종목</th><td>${results.length}</td></tr>
          <tr><th>가격 데이터 성공</th><td class="ok">${ok.length}</td></tr>
          <tr><th>가격 데이터 실패</th><td class="fail">${results.length - ok.length}</td></tr>
          <tr><th>하루 예측 적중</th><td>${correct.length}</td></tr>
          <tr><th>하루 예측 정확도</th><td>${ok.length ? (correct.length / ok.length * 100).toFixed(2) : "0.00"}%</td></tr>`;
        $("status").textContent = "완료. Excel 파일을 내려받습니다.";
        downloadExcel(results, baseUrl);
        $("runButton").disabled = false;
      }
      $("runButton").addEventListener("click", run);
    </script>
  </body>
</html>
